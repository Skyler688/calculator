<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shadow">
      <div class="calculator">
        <div class="label">
          <p class="corp">Clark.inc</p>
          <p class="model"><span>GX </span>20</p>
        </div>
        <div class="display">
          <p>0</p>
        </div>

        <button class="btn" id="clear">C</button>
        <button class="btn" id="negative_pos">+/-</button>

        <button class="btn operators" id="divide">/</button>
        <button class="btn operators" id="multiply">*</button>
        <button class="btn operators" id="sub">-</button>
        <button class="btn operators" id="add">+</button>

        <button class="btn" id="equal">=</button>

        <button class="btn" id="num_0">0</button>
        <button class="btn" id="num_1">1</button>
        <button class="btn" id="num_2">2</button>
        <button class="btn" id="num_3">3</button>
        <button class="btn" id="num_4">4</button>
        <button class="btn" id="num_5">5</button>
        <button class="btn" id="num_6">6</button>
        <button class="btn" id="num_7">7</button>
        <button class="btn" id="num_8">8</button>
        <button class="btn" id="num_9">9</button>
        <button class="btn" id="dot">.</button>
      </div>
    </div>

    <script src="scripts/script.js"></script>
  </body>
</html>
